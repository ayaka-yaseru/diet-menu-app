<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あやか式｜レシピ集</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
  :root { --cream:#FAF7F2;--warm:#F5EFE6;--accent:#C4956A;--accent-light:#E8D5C0;--dark:#2C2418;--mid:#7A6A58;--success:#6B9E6E;--border:#E0D5C8;--green:#E8F5E9;--green-border:#A5D6A7; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;padding-bottom:80px;}
  header{background:var(--dark);color:var(--cream);padding:20px 24px 16px;text-align:center;position:sticky;top:0;z-index:100;}
  header .logo{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:var(--accent);letter-spacing:2px;margin-bottom:4px;}
  header h1{font-size:18px;font-weight:700;}
  .back-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;background:var(--warm);border-radius:20px;font-size:13px;color:var(--mid);text-decoration:none;margin:16px 24px 8px;font-weight:500;}
  .controls{padding:0 24px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .search-box{flex:1;min-width:160px;}
  .search-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:'Noto Sans JP',sans-serif;background:white;color:var(--dark);}
  .search-input:focus{outline:none;border-color:var(--accent);}
  .serving-selector{display:flex;align-items:center;gap:6px;background:white;border:1.5px solid var(--border);border-radius:12px;padding:8px 12px;}
  .serving-selector label{font-size:12px;color:var(--mid);font-weight:500;white-space:nowrap;}
  .serving-btn{width:26px;height:26px;border-radius:50%;background:var(--dark);color:var(--cream);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .serving-count{font-size:16px;font-weight:700;color:var(--dark);min-width:20px;text-align:center;}
  .category-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 24px 12px;scrollbar-width:none;}
  .category-tabs::-webkit-scrollbar{display:none;}
  .cat-tab{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:white;color:var(--mid);cursor:pointer;}
  .cat-tab.active{background:var(--dark);color:var(--cream);border-color:var(--dark);}
  .recipe-section{padding:0 24px;margin-bottom:8px;}
  .section-title{font-size:13px;font-weight:700;color:var(--mid);letter-spacing:1px;padding:16px 0 8px;border-bottom:1px solid var(--border);margin-bottom:12px;}
  .recipe-card{background:white;border-radius:16px;border:1px solid var(--border);margin-bottom:16px;overflow:hidden;}
  .recipe-header{padding:16px 18px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
  .recipe-title{font-size:16px;font-weight:700;color:var(--dark);flex:1;}
  .recipe-meta{display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;}
  .meta-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
  .meta-time{background:#E8F5E9;color:#2E7D32;}
  .meta-cal{background:var(--accent-light);color:var(--dark);}
  .meta-serving{background:#E8EAF6;color:#3949AB;}
  .toggle-icon{font-size:18px;color:var(--mid);flex-shrink:0;margin-left:12px;transition:transform 0.3s;}
  .toggle-icon.open{transform:rotate(180deg);}
  .recipe-body{display:none;padding:0 18px 18px;border-top:1px solid var(--border);}
  .recipe-body.open{display:block;}
  .recipe-section-label{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;margin:14px 0 8px;}
  .cal-breakdown{background:var(--dark);color:var(--cream);border-radius:12px;padding:12px 16px;margin-bottom:8px;}
  .cal-total{font-size:28px;font-weight:700;}
  .cal-total span{font-size:13px;font-weight:400;color:#aaa;}
  .cal-note{font-size:10px;color:#aaa;margin-top:4px;}
  .ingredients-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .ingredient-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--warm);border-radius:8px;font-size:12px;gap:4px;}
  .ingredient-name{color:var(--dark);font-weight:500;flex:1;}
  .ingredient-qty{color:var(--mid);font-size:11px;white-space:nowrap;}
  .ingredient-cal{color:var(--accent);font-size:10px;white-space:nowrap;}
  .seasoning-list{display:flex;flex-wrap:wrap;gap:6px;}
  .seasoning-tag{background:#FFF8F0;border:1px solid var(--accent-light);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--dark);}
  .steps-list{list-style:none;}
  .steps-list li{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.7;}
  .steps-list li:last-child{border-bottom:none;}
  .step-num{width:24px;height:24px;border-radius:50%;background:var(--dark);color:var(--cream);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
  .ayaka-point{background:var(--green);border:1px solid var(--green-border);border-radius:12px;padding:12px 14px;margin-top:14px;font-size:12px;line-height:1.7;color:var(--dark);}
  .ayaka-point .ap-label{font-size:11px;font-weight:700;color:#2E7D32;margin-bottom:4px;}
  .no-result{text-align:center;padding:40px 24px;font-size:14px;color:var(--mid);}
</style>
</head>
<body>
<header>
  <div class="logo">ayaka's method</div>
  <h1>レシピ集</h1>
</header>
<a href="index.html" class="back-btn">← 献立メーカーに戻る</a>
<div class="controls">
  <div class="search-box">
    <input type="text" class="search-input" placeholder="食材名・レシピ名で検索..." oninput="searchRecipe(this.value)">
  </div>
  <div class="serving-selector">
    <label>人数</label>
    <button class="serving-btn" onclick="changeServing(-1)">−</button>
    <span class="serving-count" id="servingCount">1</span>
    <button class="serving-btn" onclick="changeServing(1)">+</button>
    <label>人前</label>
  </div>
</div>
<div class="category-tabs">
  <a class="cat-tab active" onclick="filterCat('all',this)">すべて</a>
  <a class="cat-tab" onclick="filterCat('breakfast',this)">🌅 朝食</a>
  <a class="cat-tab" onclick="filterCat('lunch',this)">☀️ 昼食</a>
  <a class="cat-tab" onclick="filterCat('dinner',this)">🌙 夕食</a>
</div>
<div id="recipeContainer"></div>
<script>
// CALマスター（文部科学省食品成分表2020年版準拠 kcal/100g）

  rice_mochi:168,rice_white:168,oatmeal:380,bread_whole:264,pasta_dry:378,pasta_cooked:149,

  miso:186,soy_sauce:71,sake:98,mirin:241,sugar:384,sesame_oil:921,olive_oil:894,
  butter:700,starch:330,mayonnaise:680,ponzu:52,oyster_sauce:105,shiokoji:60,
  kimchi:31,nuts:617,konjac:5,soymilk:46,sesame_white:599,nori:167,
};

const RECIPES=[
{id:‘納豆ご飯＋わかめ味噌汁’,cat:‘breakfast’,time:‘5分’,
ing:[{n:‘もち麦入りご飯’,g:130,c:‘rice_mochi’},{n:‘納豆’,g:50,c:‘natto’,u:‘1パック(50g)’},{n:‘ゆで卵’,g:50,c:‘egg’,u:‘1個(50g)’},{n:‘わかめ(乾燥)’,g:2,c:‘wakame_dry’}],
sea:[{n:‘味噌’,g:8,c:‘miso’,l:‘大さじ1/2’},{n:‘顆粒だし’,g:2,cv:9,l:‘小さじ1/2’},{n:‘醤油’,g:3,c:‘soy_sauce’,l:‘少々’}],
steps:[‘お湯150mlを沸かし顆粒だしと味噌を溶かす。乾燥わかめを加えて30秒おく。’,‘納豆に付属のタレと和がらしを加えよく混ぜる（50回以上混ぜるとふわふわになる）。’,‘ご飯の上に納豆を乗せお好みで醤油を少々かける。’,‘ゆで卵を半分に切ってお皿に添えたら完成。’],
point:‘私が2年間毎朝食べ続けた朝食の定番。納豆は50回以上混ぜるとふわふわになって全然違う食感になるよ✊’},
{id:‘オートミール＋ヨーグルト’,cat:‘breakfast’,time:‘3分’,
ing:[{n:‘オートミール(乾燥)’,g:40,c:‘oatmeal’},{n:‘ギリシャヨーグルト(無糖)’,g:80,c:‘yogurt’},{n:‘バナナ’,g:100,c:‘banana’,u:‘1本小(100g)’},{n:‘ゆで卵’,g:50,c:‘egg’,u:‘1個(50g)’}],
sea:[{n:‘はちみつ’,g:5,cv:294,l:‘小さじ3/4(お好みで)’}],
steps:[‘耐熱容器にオートミールと水100mlを入れ電子レンジ(600W)で2分加熱する。’,‘加熱したオートミールをよく混ぜてなめらかにする。’,‘バナナを輪切りにする。’,‘器にオートミールを盛りヨーグルトをかけバナナを乗せる。お好みではちみつをかける。’,‘ゆで卵を添えて完成。’],

ing:[{n:‘もち麦入りご飯’,g:130,c:‘rice_mochi’},{n:‘鮭フレーク’,g:30,c:‘salmon_flake’},{n:‘ゆで卵’,g:50,c:‘egg’,u:‘1個(50g)’},{n:‘わかめ(乾燥)’,g:2,c:‘wakame_dry’}],
sea:[{n:‘味噌’,g:8,c:‘miso’,l:‘大さじ1/2’},{n:‘顆粒だし’,g:2,cv:9,l:‘小さじ1/2’},{n:‘醤油’,g:3,c:‘soy_sauce’,l:‘少々’}],
steps:[‘お湯150mlに顆粒だしを溶かし沸かし味噌を溶き入れる。乾燥わかめを加えて完成。’,‘ご飯の上に鮭フレークを乗せお好みで醤油を少々かける。’,‘ゆで卵を半分に切って添えたら完成。’],
point:‘鮭フレークは市販品でOK。塩分が高めのものが多いから味噌汁は薄めに作るとバランスがいいよ✊’},
{id:‘バナナヨーグルト＋ゆで卵’,cat:‘breakfast’,time:‘2分’,
ing:[{n:‘ギリシャヨーグルト(無糖)’,g:120,c:‘yogurt’},{n:‘バナナ’,g:100,c:‘banana’,u:‘1本小(100g)’},{n:‘ゆで卵’,g:100,c:‘egg’,u:‘2個(100g)’},{n:‘素焼きナッツ’,g:10,c:‘nuts’}],

point:‘卵は前日の夜にまとめて茹でておくと毎朝そのまま使えて楽だよ🌿’},
{id:‘ご飯＋卵かけ＋きのこ味噌汁’,cat:‘breakfast’,time:‘5分’,
ing:[{n:‘もち麦入りご飯’,g:130,c:‘rice_mochi’},{n:‘卵’,g:50,c:‘egg’,u:‘1個(50g)’},{n:‘海苔’,g:3,c:‘nori’,u:‘1枚(3g)’},{n:‘しめじ’,g:50,c:‘shimeji’}],
sea:[{n:‘醤油’,g:5,c:‘soy_sauce’,l:‘小さじ1’},{n:‘味噌’,g:8,c:‘miso’,l:‘大さじ1/2’},{n:‘顆粒だし’,g:2,cv:9,l:‘小さじ1/2’}],

{id:‘全粒粉トースト＋納豆＋ヨーグルト’,cat:‘breakfast’,time:‘5分’,
ing:[{n:‘全粒粉パン’,g:70,c:‘bread_whole’,u:‘1〜2枚(70g)’},{n:‘納豆’,g:50,c:‘natto’,u:‘1パック(50g)’},{n:‘ゆで卵’,g:50,c:‘egg’,u:‘1個(50g)’},{n:‘ギリシャヨーグルト(無糖)’,g:60,c:‘yogurt’}],
sea:[{n:‘はちみつ’,g:5,cv:294,l:‘小さじ3/4(お好みで)’}],
steps:[‘パンをトースターで2〜3分焼く。’,‘納豆にタレと和がらしを加えよく混ぜる。’,‘焼いたパンの上に納豆を乗せる。’,‘ゆで卵を半分に切って添えヨーグルトを小皿に盛ったら完成。’],
point:‘納豆トーストは最初「えっ？」って思ったけど食べたらハマった。全粒粉パンのカリカリと納豆の組み合わせが意外においしいよ✊’},
{id:‘オートミール雑炊’,cat:‘breakfast’,time:‘3分’,
ing:[{n:‘オートミール(乾燥)’,g:50,c:‘oatmeal’},{n:‘卵’,g:50,c:‘egg’,u:‘1個(50g)’},{n:‘わかめ(乾燥)’,g:2,c:‘wakame_dry’}],
sea:[{n:‘醤油’,g:5,c:‘soy_sauce’,l:‘小さじ1’},{n:‘顆粒だし’,g:2,cv:9,l:‘小さじ1’},{n:‘ごま油’,g:3,c:‘sesame_oil’,l:‘少々(お好みで)’}],
steps:[‘耐熱容器にオートミール・水200ml・顆粒だし・乾燥わかめを入れる。’,‘電子レンジ(600W)で2分加熱する。’,‘取り出してよく混ぜ卵を割り入れてさらに30秒加熱する。’,‘醤油をかけお好みでごま油・刻みねぎを加えて完成。’],
point:‘電子レンジの機種によって加熱時間が変わるから最初は様子を見ながら調整してね🌿’},
{id:‘豆腐そぼろ丼＋みそ汁’,cat:‘breakfast’,time:‘10分’,
ing:[{n:‘もち麦入りご飯’,g:120,c:‘rice_mochi’},{n:‘木綿豆腐’,g:80,c:‘tofu_firm’},{n:‘鶏ひき肉’,g:50,c:‘chicken_ground’},{n:‘しめじ’,g:50,c:‘shimeji’}],
sea:[{n:‘醤油’,g:10,c:‘soy_sauce’,l:‘小さじ2’},{n:‘みりん’,g:10,c:‘mirin’,l:‘小さじ2’},{n:‘砂糖’,g:2,c:‘sugar’,l:‘小さじ1/2’},{n:‘ごま油’,g:3,c:‘sesame_oil’,l:‘少々’},{n:‘味噌’,g:8,c:‘miso’,l:‘大さじ1/2’}],

{id:‘サーモンアボカドご飯’,cat:‘breakfast’,time:‘5分’,

sea:[{n:‘醤油’,g:3,c:‘soy_sauce’,l:‘少々’},{n:‘味噌’,g:8,c:‘miso’,l:‘大さじ1/2(味噌汁用)’},{n:‘レモン汁’,g:5,c:‘lemon’,l:‘少々(変色防止)’}],

{id:‘ちりめんじゃこご飯＋豆腐味噌汁’,cat:‘breakfast’,time:‘5分’,
ing:[{n:‘もち麦入りご飯’,g:130,c:‘rice_mochi’},{n:‘ちりめんじゃこ’,g:15,c:‘shirasu’,u:‘大さじ2(15g)’},{n:‘ゆで卵’,g:50,c:‘egg’,u:‘1個(50g)’},{n:‘絹ごし豆腐’,g:50,c:‘tofu_silk’},{n:‘わかめ(乾燥)’,g:2,c:‘wakame_dry’}],
sea:[{n:‘醤油’,g:3,c:‘soy_sauce’,l:‘少々’},{n:‘白ごま’,g:2,c:‘sesame_white’,l:‘少々’},{n:‘味噌’,g:8,c:‘miso’,l:‘大さじ1/2’}],

{id:‘鶏むね肉のサラダ丼’,cat:‘lunch’,time:‘15分’,

// カロリー計算（g×cal/100g）
function getCalVal(item) {
if (item.cv !== undefined) return item.cv;
if (item.c && CAL[item.c] !== undefined) return CAL[item.c];
return 0;
}
function calcTotal(recipe, serving) {
let t = 0;
recipe.ing.forEach(i => t += i.g * serving * getCalVal(i) / 100);
recipe.sea.forEach(s => t += s.g * serving * getCalVal(s) / 100);
return Math.round(t);
}
function dispQ(item, serving) {
if (item.u && serving === 1) return item.u;
const total = item.g * serving;
if (total < 5) return total.toFixed(1) + ‘g’;
return (Math.round(total / 5) * 5) + ‘g’;
}

let currentServing = 1, currentCat = ‘all’;

function changeServing(d) {
currentServing = Math.max(1, Math.min(6, currentServing + d));
document.getElementById(‘servingCount’).textContent = currentServing;
rerenderOpen();
}
function rerenderOpen() {
const openIds = […document.querySelectorAll(’.recipe-body.open’)].map(e => e.id.replace(‘body-’,’’));
const filtered = currentCat === ‘all’ ? RECIPES : RECIPES.filter(r => r.cat === currentCat);
renderRecipes(filtered, openIds);
}

function renderRecipes(list, keepOpenIds) {
const container = document.getElementById(‘recipeContainer’);
if (!list.length) { container.innerHTML = ‘<div class="no-result">該当するレシピが見つかりませんでした</div>’; return; }
const cats = [{key:‘breakfast’,label:‘🌅 朝食’},{key:‘lunch’,label:‘☀️ 昼食’},{key:‘dinner’,label:‘🌙 夕食’}];
let html = ‘’;
cats.forEach(cat => {
const items = list.filter(r => r.cat === cat.key);
if (!items.length) return;
html += `<div class="recipe-section"><div class="section-title">${cat.label}</div>`;
items.forEach(r => {
const aid = r.id.replace(/[^\w\u3040-\u9FFF]/g,’*’);
const total = calcTotal(r, currentServing);
const sLabel = currentServing > 1 ? currentServing + ‘人前’ : ‘1人前’;
const isOpen = keepOpenIds && keepOpenIds.includes(aid);
const rows = r.ing.map(i => {
const ical = Math.round(i.g * currentServing * getCalVal(i) / 100);
return `<div class="ingredient-row"><span class="ingredient-name">${i.n}</span><span class="ingredient-qty">${dispQ(i,currentServing)}</span><span class="ingredient-cal">${ical}kcal</span></div>`;
}).join(’’);
const seas = r.sea.map(s => `<span class="seasoning-tag">${s.n}（${s.l}）</span>`).join(’’);
const steps = r.steps.map((s,i) => `<li><div class="step-num">${i+1}</div><div>${s}</div></li>`).join(’’);
html += `<div class="recipe-card" id="${aid}"> <div class="recipe-header" onclick="toggleRecipe('${aid}')"> <div> <div class="recipe-title">${r.id}</div> <div class="recipe-meta"> <span class="meta-badge meta-time">⏱ ${r.time}</span> <span class="meta-badge meta-cal">${total}kcal</span> <span class="meta-badge meta-serving">${sLabel}</span> </div> </div> <div class="toggle-icon ${isOpen?'open':''}" id="icon-${aid}">▼</div> </div> <div class="recipe-body ${isOpen?'open':''}" id="body-${aid}"> <div class="cal-breakdown"> <div class="cal-total">${total}<span> kcal</span></div> <div class="cal-note">食材＋調味料の合計 / ${sLabel}（文部科学省食品成分表2020参考・目安値）※塩分は減塩醤油・薄味で調整推奨</div> </div> <div class="recipe-section-label">🥬 食材（${sLabel}）</div> <div class="ingredients-grid">${rows}</div> <div class="recipe-section-label">🧂 調味料</div> <div class="seasoning-list">${seas}</div> <div class="recipe-section-label">📝 作り方</div> <ol class="steps-list">${steps}</ol> <div class="ayaka-point"><div class="ap-label">💬 あやかのワンポイント</div>${r.point}</div> </div> </div>`;
});
html += ‘</div>’;
});
container.innerHTML = html;
if (!keepOpenIds && location.hash) {
const raw = decodeURIComponent(location.hash.slice(1));
const target = raw.replace(/[^\w\u3040-\u9FFF]/g,’*’);
setTimeout(() => {
const el = document.getElementById(target);
if (el) { el.scrollIntoView({behavior:‘smooth’,block:‘start’}); toggleRecipe(target); }
}, 400);
}
}
function toggleRecipe(id) {
const body = document.getElementById(‘body-’+id), icon = document.getElementById(‘icon-’+id);
if (!body) return;
const open = body.classList.contains(‘open’);
body.classList.toggle(‘open’,!open); icon.classList.toggle(‘open’,!open);
}
function filterCat(cat,el) {
currentCat = cat;
document.querySelectorAll(’.cat-tab’).forEach(t=>t.classList.remove(‘active’));
el.classList.add(‘active’);
renderRecipes(cat===‘all’?RECIPES:RECIPES.filter(r=>r.cat===cat));
}
function searchRecipe(q) {
q = q.trim().toLowerCase();
if (!q) { renderRecipes(currentCat===‘all’?RECIPES:RECIPES.filter(r=>r.cat===currentCat)); return; }
renderRecipes(RECIPES.filter(r=>r.id.toLowerCase().includes(q)||r.ing.some(i=>i.n.includes(q))||r.sea.some(s=>s.n.includes(q))));
}
renderRecipes(RECIPES);
</script>

</body>
</html>
